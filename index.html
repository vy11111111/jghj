<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SAPA EXPLORE</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:linear-gradient(to bottom,#fff0f5,#ffe4ec);
}

/* NAVBAR */

.navbar{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 25px;
background:#f8b6c8;
color:white;
position:sticky;
top:0;
z-index:1000;
}

.navbar a{
color:white;
margin-left:15px;
text-decoration:none;
font-weight:bold;
}

.logo{
font-size:20px;
font-weight:bold;
}

/* HEADER SLIDER */

header{
position:relative;
height:300px;
overflow:hidden;
color:white;
}

.slides{
display:flex;
height:300px;
transition:transform 6s ease;
}

.slide{
min-width:100%;
height:300px;
background-size:cover;
background-position:center;
}

.hero-text{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
text-align:center;
}

.hero-text h1{
font-size:42px;
}

/* WEATHER */

.weather-bar{
background:#ffd6e7;
text-align:center;
padding:10px;
font-weight:bold;
}

/* GRID */

.container{
max-width:1200px;
margin:auto;
padding:20px;
}

.places{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}

.card{
background:white;
border-radius:12px;
overflow:hidden;
box-shadow:0 6px 15px rgba(0,0,0,0.15);
transition:0.3s;
opacity:0;
transform:translateY(40px);
}

.card.show{
opacity:1;
transform:translateY(0);
}

.card:hover{
transform:translateY(-8px);
}

.card img{
width:100%;
height:170px;
object-fit:cover;
cursor:pointer;
transition:0.4s;
}

.card img:hover{
transform:scale(1.05);
}

.card-content{
padding:15px;
}

.area{
font-size:13px;
color:gray;
margin-bottom:6px;
}

/* MAP */

#map{
width:100%;
height:400px;
border-radius:10px;
margin-top:30px;
}

/* BOOKING */

.booking{
margin-top:40px;
background:white;
padding:20px;
border-radius:12px;
box-shadow:0 6px 15px rgba(0,0,0,0.15);
}

.booking input,.booking select,.booking button{
width:100%;
padding:10px;
margin:8px 0;
border-radius:8px;
border:1px solid #ccc;
}

.booking button{
background:#f48fb1;
color:white;
border:none;
cursor:pointer;
font-weight:bold;
}

/* FOOTER */

footer{
background:#f8b6c8;
color:white;
padding:15px;
margin-top:40px;
}

.footer-content{
display:flex;
justify-content:space-between;
max-width:1200px;
margin:auto;
}

/* BACK TO TOP */

#topBtn{
position:fixed;
bottom:30px;
right:30px;
background:#f48fb1;
color:white;
border:none;
padding:12px;
border-radius:50%;
cursor:pointer;
display:none;
}

/* LIGHTBOX */

#lightbox{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.8);
display:none;
align-items:center;
justify-content:center;
}

#lightbox img{
max-width:90%;
max-height:90%;
border-radius:10px;
}

/* POPUP THÔNG BÁO */

#popup{
position:fixed;
bottom:20px;
left:20px;
background:white;
padding:12px 18px;
border-radius:8px;
box-shadow:0 5px 15px rgba(0,0,0,0.3);
display:none;
font-weight:bold;
}

</style>
</head>

<body>

<div class="navbar">
<div class="logo">SAPA EXPLORE</div>
<div>
<a href="#">Trang chủ</a>
<a href="#places">Địa điểm</a>
<a href="#tour">Tour</a>
</div>
</div>

<header>

<div class="slides">
<div class="slide" style="background-image:url('https://puolotrip.com/uploads/images/2023/09/du-lich-sapa-3-jpeg.webp')"></div>
<div class="slide" style="background-image:url('https://static.vinwonders.com/production/sa-pa-o-tinh-nao.jpg')"></div>
<div class="slide" style="background-image:url('https://baosontravel.vn/wp-content/uploads/2025/03/sapa.webp')"></div>
<div class="slide" style="background-image:url('https://puolotrip.com/uploads/images/2023/09/du-lich-sapa-3-jpeg.webp')"></div>
</div>

<div class="hero-text">
<h1>SAPA EXPLORE</h1>
<p>Thành phố trong sương - Xứ sở sương mù - Nàng thơ của Tây Bắc</p>
</div>

</header>

<div class="weather-bar">
🌤 Thời tiết Sa Pa: <span id="weather">Đang tải...</span>
</div>

<div style="text-align:center;font-weight:bold;">
Địa điểm đã xem: <span id="viewCount">0</span>
</div>

<div class="container">

<div class="places" id="places"></div>

<h2>Bản đồ các địa điểm Sa Pa</h2>
<div id="map"></div>

<div class="booking" id="tour">

<h2>Đặt Tour Sa Pa</h2>

<p><b>Số người đã đặt tour: <span id="tourCount">0</span></b></p>

<input type="text" placeholder="Họ và tên">
<input type="tel" placeholder="Số điện thoại">

<select>
<option>Chọn địa điểm</option>
<option>Fansipan</option>
<option>Bản Cát Cát</option>
<option>Thung lũng Mường Hoa</option>
<option>Nhà thờ đá Sa Pa</option>
<option>Núi Hàm Rồng</option>
<option>Bản Tả Van</option>
<option>Đèo Ô Quy Hồ</option>
<option>Chợ Sa Pa</option>
</select>

<button onclick="bookTour()">Đặt Tour</button>

</div>

</div>

<footer>

<div class="footer-content">
<div>Nguyễn Thảo Vy (42)</div>
<div> SAPA LUÔN ĐỢI BẠN </div>
</div>

</footer>

<button id="topBtn" onclick="topFunction()">↑</button>

<div id="lightbox">
<img id="lightImg">
</div>

<div id="popup"></div>

<script>

let viewCount=0
let tourCount=0

const lightbox=document.getElementById("lightbox")
const lightImg=document.getElementById("lightImg")

const places=[

{name:"Fansipan",area:"Núi",lat:22.3033,lng:103.7786,desc:"Nóc nhà Đông Dương cao 3143m.",img:"https://thesinhtour.com/wp-content/uploads/2021/12/du-lich-sapa-1.jpg"},

{name:"Bản Cát Cát",area:"Núi",lat:22.329,lng:103.838,desc:"Bản làng người H'Mông nổi tiếng.",img:"https://motogo.vn/wp-content/uploads/2020/02/sapa-cat-cat.jpg"},

{name:"Thung lũng Mường Hoa",area:"Núi",lat:22.308,lng:103.843,desc:"Ruộng bậc thang tuyệt đẹp.",img:"https://mia.vn/media/uploads/blog-du-lich/thung-lung-muong-hoa-dao-choi-vuon-dia-dang-tuyet-sac-03-1621231411.jpg"},

{name:"Nhà thờ đá Sa Pa",area:"Phố cổ",lat:22.3365,lng:103.8438,desc:"Công trình kiến trúc Pháp.",img:"https://dulichsapa.org.vn/wp-content/uploads/Nha-Tho-Da-Sapa.jpg"},

{name:"Núi Hàm Rồng",area:"Núi",lat:22.339,lng:103.845,desc:"Khu du lịch sinh thái đẹp.",img:"https://static.vinwonders.com/production/vi-tri-nui-ham-rong.jpg"},

{name:"Bản Tả Van",area:"Núi",lat:22.297,lng:103.881,desc:"Ngôi làng yên bình.",img:"https://pystravel.vn/_next/image?url=https%3A%2F%2Fbooking.pystravel.vn%2Fuploads%2Fposts%2Falbums%2F18423%2F3e84162ba7479336c0f963aba83b3e53.jpg&w=1920&q=75"},

{name:"Đèo Ô Quy Hồ",area:"Núi",lat:22.363,lng:103.782,desc:"Một trong tứ đại đỉnh đèo.",img:"https://mia.vn/media/uploads/blog-du-lich/KH2F47~1-1621753459.JPG"},

{name:"Chợ Sa Pa",area:"Phố cổ",lat:22.335,lng:103.844,desc:"Nơi mua đặc sản vùng cao.",img:"https://123tadi.com/wp-content/Uploads/2022/10/ch%E1%BB%A3%20%C4%91%C3%AAm%20sapa%203.jpg"}

]

function render(){

const container=document.getElementById("places")

places.forEach((place,i)=>{

const card=document.createElement("div")
card.className="card"

card.innerHTML=`
<img src="${place.img}" onclick="openLight('${place.img}')">

<div class="card-content">
<h3>${place.name}</h3>
<div class="area">Khu vực: ${place.area}</div>
<p>${place.desc}</p>
</div>
`

setTimeout(()=>card.classList.add("show"),i*100)

container.appendChild(card)

})

}

render()

function openLight(src){

viewCount++
document.getElementById("viewCount").innerText=viewCount

lightbox.style.display="flex"
lightImg.src=src

}

lightbox.onclick=()=>lightbox.style.display="none"

/* TOUR */

function bookTour(){

tourCount++
document.getElementById("tourCount").innerText=tourCount

showPopup("🎉 Một du khách vừa đặt tour Sa Pa!")

}

function showPopup(text){

const popup=document.getElementById("popup")

popup.innerText=text
popup.style.display="block"

setTimeout(()=>{
popup.style.display="none"
},3000)

}

/* WEATHER */

fetch("https://api.open-meteo.com/v1/forecast?latitude=22.3364&longitude=103.8438&current_weather=true")
.then(res=>res.json())
.then(data=>{
document.getElementById("weather").innerText=
data.current_weather.temperature+"°C | Gió "+data.current_weather.windspeed+" km/h"
})

/* MAP */

function initMap(){

const map=new google.maps.Map(document.getElementById("map"),{
zoom:11,
center:{lat:22.3364,lng:103.8438}
})

places.forEach(p=>{
new google.maps.Marker({
position:{lat:p.lat,lng:p.lng},
map:map,
title:p.name
})
})

}

/* BACK TO TOP */

const topBtn=document.getElementById("topBtn")

window.onscroll=function(){

if(document.documentElement.scrollTop>300){
topBtn.style.display="block"
}else{
topBtn.style.display="none"
}

}

function topFunction(){
window.scrollTo({top:0,behavior:"smooth"})
}

/* SLIDER */

let slideIndex=0

function autoSlide(){

const slides=document.querySelector(".slides")
const total=document.querySelectorAll(".slide").length

slideIndex++

if(slideIndex>=total){
slideIndex=0
}

slides.style.transform="translateX(-"+slideIndex*100+"%)"

}

setInterval(autoSlide,7000)

</script>

<script src="https://maps.googleapis.com/maps/api/js?callback=initMap" async defer></script>

</body>
</html>
